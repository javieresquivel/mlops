apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose convert -f docker-compose.yml -o kubernetes-manifests/ --volumes hostPath
    kompose.version: 1.26.0 (40646f47)
  labels:
    io.kompose.service: api
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: api
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: ./kompose convert -f docker-compose.yml -o kubernetes-manifests/ --volumes hostPath
        kompose.version: 1.26.0 (40646f47)
      labels:
        io.kompose.network/proyecto-2-default: "true"
        io.kompose.service: api
    spec:
      containers:
        - args:
            - uvicorn
            - main:app
            - --host
            - 0.0.0.0
            - --port
            - "80"
            - --reload
          env:
            - name: DB_HOST
              value: mysql-db
            - name: DB_NAME
              value: training
            - name: DB_PASSWORD
              value: password
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: user
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:8003
            - name: MODELS_DIR
              value: /app/models
            - name: MODEL_NAME
              value: diabetes-model
            - name: MODEL_STAGE
              value: prod
          image: javieresquivel123/mlops:v3.0
          name: api
          ports:
            - containerPort: 80
              hostPort: 8015
              protocol: TCP
          resources:
            limits:
              cpu: 1500m
              memory: "536870912"
            requests:
              cpu: 250m
              memory: "268435456"
          volumeMounts:
            - mountPath: /app/models
              name: api-hostpath0
      restartPolicy: Always
      volumes:
        - hostPath:
            path: /home/ubuntu/Proyects/MLOPS_Talleres/mlops/proyecto_2/models
          name: api-hostpath0
