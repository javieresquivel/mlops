apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose convert -f docker-compose.yml -o kubernetes-manifests/ --volumes hostPath
    kompose.version: 1.26.0 (40646f47)
  labels:
    io.kompose.service: bucket-init
  name: bucket-init
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: bucket-init
  template:
    metadata:
      annotations:
        kompose.cmd: ./kompose convert -f docker-compose.yml -o kubernetes-manifests/ --volumes hostPath
        kompose.version: 1.26.0 (40646f47)
      labels:
        io.kompose.network/proyecto-2-default: "true"
        io.kompose.service: bucket-init
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - |2
                until mc alias set minio http://minio:9000 admin supersecret; do
                  echo 'waiting for minio...'; sleep 2;
                done;
                mc mb -p minio/mlflows || true;
                mc cp --no-color /dev/null minio/mlflows/artifacts/.keep || true;
                echo 'Bucket mlflows created.';
          image: quay.io/minio/mc:latest
          name: bucket-init
      restartPolicy: Always
