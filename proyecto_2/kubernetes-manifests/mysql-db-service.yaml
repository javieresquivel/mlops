apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: ./kompose convert -f docker-compose.yml -o kubernetes-manifests/ --volumes hostPath
    kompose.version: 1.26.0 (40646f47)
  labels:
    io.kompose.service: mysql-db
  name: mysql-db
  namespace: default
spec:
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    io.kompose.service: mysql-db
  type: ClusterIP
