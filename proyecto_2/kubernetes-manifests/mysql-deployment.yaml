apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose convert -f docker-compose.yml -o kubernetes-manifests/ --volumes hostPath
    kompose.version: 1.26.0 (40646f47)
  labels:
    io.kompose.service: mysql
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: ./kompose convert -f docker-compose.yml -o kubernetes-manifests/ --volumes hostPath
        kompose.version: 1.26.0 (40646f47)
      labels:
        io.kompose.network/proyecto-2-default: "true"
        io.kompose.service: mysql
    spec:
      containers:
        - env:
            - name: MYSQL_DATABASE
              value: mlflow_db
            - name: MYSQL_PASSWORD
              value: password
            - name: MYSQL_ROOT_PASSWORD
              value: password
            - name: MYSQL_USER
              value: user
          image: mysql:8.4
          name: mysql
          ports:
            - containerPort: 3306
              hostPort: 8004
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: "536870912"
            requests:
              cpu: 200m
              memory: "268435456"
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-ml-data
      restartPolicy: Always
      volumes:
        - hostPath:
            path: /home/ubuntu/Proyects/k8s_data/mysql
          name: mysql-ml-data
